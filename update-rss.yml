name: Mettre à jour la veille RSS

on:
  workflow_dispatch:
  schedule:
    - cron: "37 5,11,17,23 * * *"
      timezone: "Europe/Paris"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Agréger les flux RSS
        run: python build.py

      - name: Maintenir la programmation active
        shell: bash
        run: |
          if [ ! -f .last_keepalive ] || find .last_keepalive -mtime +30 -print -quit | grep -q .; then
            date -u +"%Y-%m-%dT%H:%M:%SZ" > .last_keepalive
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .last_keepalive
            git commit -m "chore: keep scheduled RSS updates active" || true
            git push || true
          fi

      - name: Configurer GitHub Pages
        uses: actions/configure-pages@v5

      - name: Préparer le site
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Publier sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
